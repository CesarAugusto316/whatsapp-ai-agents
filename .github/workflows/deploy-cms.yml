name: Deploy CMS (Next.js)
on:
  push:
    paths:
      - "cms/**"
      # 'whatsapp-api/**'
      # 'chat-agent/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "cms/pnpm-lock.yaml"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: ./cms
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: ./cms
        run: pnpm test:unit || echo "Tests opcionales"

      - name: Build
        working-directory: ./cms
        env:
          # Añade variables de build necesarias
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: pnpm build

      - name: Deploy to Vercel/Dokploy (ajusta según tu deploy)
        working-directory: ./cms
        run: |
          echo "Añade aquí tus comandos de despliegue"
          # Ejemplo para Vercel:
          # pnpm vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
