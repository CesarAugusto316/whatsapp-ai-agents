name: Retag
on:
  push:
    branches:
      - main
    paths:
      - "whatsapp-api/**"
      - "!whatsapp-api/**/*.md" # ignorar cambios en READMEs
      - "whatsapp-api/docker-compose.yml"
      - "whatsapp-api/package.json"
  workflow_dispatch:

jobs:
  r:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: |
          docker pull devlikeapro/waha:gows
          docker tag  devlikeapro/waha:gows cesarrivera316/waha:gows
          docker push cesarrivera316/waha:gows
