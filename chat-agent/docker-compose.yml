services:
  redis:
    image: redis:alpine
    container_name: redis-agent
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server
    # volumes:
    #   - redis_data:/data
    # command:
    #   redis-server
    # --save 60 1          # Guarda cada 60s si hay 1+ cambio[citation:2]
    # --appendonly yes    # Habilita persistencia opcional[citation:9]
    # --loglevel warning
    healthcheck: # Verifica que Redis esté listo[citation:1]
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

