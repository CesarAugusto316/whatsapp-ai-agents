  redis:
    image: redis:alpine
    container_name: redis-agent
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server
    healthcheck: # Verifica que Redis esté listo[citation:1]
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC (opcional, puedes ignorarlo)

    volumes:
      - ./qdrant_data:/qdrant/storage

    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

