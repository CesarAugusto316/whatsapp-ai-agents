  redis:
    image: redis:alpine
    container_name: redis-agent
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server
    healthcheck: # Verifica que Redis esté listo[citation:1]
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

