services:
  postgres:
    image: postgres:17-alpine # light & fast
    container_name: pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # named volume

volumes:
  pgdata:
